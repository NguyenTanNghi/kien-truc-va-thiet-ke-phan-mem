version: "3.8"

services:
  backend:
    container_name: backend_app
    build: .
    ports:
      - "3000:3000"
    environment:
      - MONGO_URL=mongodb://mongo:27017/mydb
    depends_on:
      - mongo
    volumes:
      - .:/app
    working_dir: /app
    command: npm run start:dev

  mongo:
    container_name: mongo_db
    image: mongo:6
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db

volumes:
  mongo_data:
